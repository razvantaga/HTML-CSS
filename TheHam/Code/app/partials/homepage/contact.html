<section class="contact">
  <div class="content">
    <div class="map">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2712.7373529221095!2d27.591202777003414!3d47.1629982185043!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40cafb8300d158ef%3A0xad0e6880945a6681!2sStrada%20Elena%20Doamna%2020-22%2C%20Ia%C8%99i%20700398!5e0!3m2!1sen!2sro!4v1760180391475!5m2!1sen!2sro"
        width="600"
        height="450"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
    <div class="wrapper">
      <div class="heading">
        <h2>Keep In Touch</h2>
      </div>
      <form action="#" method="post">
        <div class="form-wrapper">
          <div class="form-input">
            <label for="name"></label>
            <input type="text" name="name" id="name" placeholder="Name" />
          </div>
          <div class="form-input">
            <label for="email"></label>
            <input type="email" name="email" id="email" placeholder="Email" />
          </div>
        </div>

        <div class="form-wrapper">
          <div class="form-input">
            <label for="message"></label>
            <textarea
              name="message"
              id="message"
              placeholder="Message"
            ></textarea>
          </div>
        </div>

        <input type="submit" value="SEND MESSAGE"></input>
      </form>
    </div>
  </div>
</section>
